name: Post tweet thread

on:
  deployment_status:

jobs:
  tweet:
    # Only run when GitHub Pages deployment succeeds
    if: >
      github.event.deployment_status.state == 'success' &&
      github.event.deployment.environment == 'github-pages'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check for tweet bundle
        id: check
        run: |
          if [ -f "_tweet/en/thread.json" ] || [ -f "_tweet/es/thread.json" ]; then
            echo "found=true" >> $GITHUB_OUTPUT
            echo "Tweet bundle found — will post threads."
          else
            echo "found=false" >> $GITHUB_OUTPUT
            echo "No tweet bundle — skipping."
          fi

      - name: Install tweepy
        if: steps.check.outputs.found == 'true'
        run: pip install tweepy

      - name: Post EN thread
        if: steps.check.outputs.found == 'true'
        env:
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_TOKEN_SECRET: ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
        run: python .github/scripts/post_thread.py --lang en

      - name: Post ES thread
        if: steps.check.outputs.found == 'true'
        env:
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_TOKEN_SECRET: ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
        run: python .github/scripts/post_thread.py --lang es

      - name: Cleanup tweet bundle
        if: steps.check.outputs.found == 'true'
        run: |
          rm -rf _tweet/
          git config user.email "econofutbol@outlook.com"
          git config user.name "Econofútbol"
          git add -A
          git commit -m "cleanup: remove tweet bundle after posting"
          git push
